version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama_ai
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    networks:
      - automation-net
    # Uncomment to enable GPU support (requires NVIDIA Container Toolkit)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  mcp-server:
    build: 
      context: .
      dockerfile: Dockerfile.mcp
    container_name: mcp_playwright
    restart: unless-stopped
    networks:
      - automation-net
    ipc: host # Importante para Chromium en Docker (evitar crashes de memoria)

volumes:
  ollama_data:

networks:
  automation-net:
    driver: bridge
